name: Publish packages

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libs (ordered)
        run: pnpm run build:libs-ordered

      - name: Publish packages via Changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run publish:changesets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
